name: Refresh GitHub snapshot

# Fetches a fresh contributions and LoC snapshot from the GitHub API and
# commits lib/github-data.json. The git push then triggers Cloudflare
# Pages' git-integration auto-deploy, so the live site shows current
# data without needing a CF deploy hook or CF-side GITHUB_TOKEN.
#
# Setup once:
#   gh secret set GH_PAT -R cjber/cjber.dev
# (paste a PAT with `repo` scope so the fetcher can read commits in
# private thirdweb-dev repos. Public-only repos work with the default
# secrets.GITHUB_TOKEN but Nebula needs `repo`.)

on:
  schedule:
    - cron: '30 6 * * *'   # daily, 06:30 UTC
  workflow_dispatch:       # manual trigger button
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-github-data.ts'
      - '.github/workflows/refresh-github-stats.yml'

concurrency:
  group: refresh-github-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install --no-audit --no-fund

      - name: Fetch fresh snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: cjber
        run: npx tsx scripts/fetch-github-data.ts

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- lib/github-data.json; then
            echo "no snapshot changes"
            exit 0
          fi
          git add lib/github-data.json
          git commit -m "data: refresh GitHub snapshot ($(date -u +%Y-%m-%d))"
          git push
